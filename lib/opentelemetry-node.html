<!--  OpenTelemetry node -->
<style>
  .node-input-otelAttributeMapping {
      flex-grow: 1;
    }
    .node-input-otelAttributeMapping input {
      width: calc(25% - 5px);
      margin-left: 5px;
    }
    .node-input-otelAttributeMapping-isAfterProcess {
      width: 60px;
    }
</style>
<script type="text/javascript">
function sortAttributeMappings (a, b) {
  if (a.flow === b.flow) {
    if (a.nodeType === b.nodeType) {
      return a.key > b.key
    }
    return a.nodeType > b.nodeType
  }
  return a.flow > b.flow
}
RED.nodes.registerType('OpenTelemetry', {
  category: 'Tracing',
  paletteLabel: 'OTEL',
  icon: 'opentelemetry.svg',
  color: '#f5a800',
  defaults: {
    name: {
      value: '',
    },
    url: {
      value: 'http://localhost:4318/v1/traces',
      required: true,
      validate: (v) => {
        try {
          new URL(v)
          return true
        } catch (_err) {
          return false
        }
      },
    },
    metricsUrl: {
      value: 'http://localhost:4318/v1/metrics',
      required: false,
    },
    logsUrl: {
      value: 'http://localhost:4318/v1/logs',
      required: false,
    },
    tracesEnabled: {
      value: true,
    },
    metricsEnabled: {
      value: false,
    },
    logsEnabled: {
      value: false,
    },
    serviceName: {
      value: 'Node-RED',
      required: true,
    },
    protocol: {
      value: 'http',
      required: true,
    },
    rootPrefix: {
      value: 'Message ',
    },
    timeout: {
      value: 10,
      required: true,
    },
    ignoredTypes: {
      value: 'debug,catch',
    },
    propagateHeadersTypes: {
      value: '',
    },
    logLevel: {
      value: 'warn',
    },
    attributeMappings: {
      value: [],
      validate: (attributeMappings) => {
        if (!attributeMappings || attributeMappings.length === 0) {
          return true
        }
        const errors = []
        attributeMappings.forEach((attributeMapping) => {
          if (!attributeMapping || String(attributeMapping.key ?? '').trim() === '') {
            errors.push('OTEL key must be a non-null string')
          }
          if (!attributeMapping || String(attributeMapping.path ?? '').trim() === '') {
            errors.push('Path must be a non-null string')
          }
        })
        if (errors.length) {
          console.warn(errors.join(', '))
          return false
        }
        return true
      },
    },
  },
  label: function () {
    return this.name || 'OpenTelemetry'
  },
  oneditprepare: function () {
    $('#node-input-otelAttributeMapping-container').css('min-height', '150px').css('min-width', '450px').editableList({
      addItem: (container, _i, opt) => {
        // biome-ignore lint/suspicious/noPrototypeBuiltins: use browser-compatible hasOwn check for older Node-RED editor runtimes
        if (!Object.prototype.hasOwnProperty.call(opt, 'attributeMapping')) {
          opt.attributeMapping = {
            isAfter: false,
            flow: '',
            nodeType: '',
            key: '',
            path: '',
          }
        }
        container.css({
          overflow: 'hidden',
          whiteSpace: 'nowrap',
          display: 'flex',
        })
        const selectField = $('<select/>', { class: 'node-input-otelAttributeMapping-isAfterProcess', title: 'Does the attribute should be parsed before or after node processing?' })
        container.append(
          selectField,
          $('<div/>', { class: 'node-input-otelAttributeMapping' })
            .append(
              $('<input/>', { class: 'node-input-otelAttributeMapping-flow', type: 'text', placeholder: 'Flow id or empty for all flows', title: 'Flow id or empty for all flows', value: opt.attributeMapping.flow }),
              $('<input/>', { class: 'node-input-otelAttributeMapping-nodeType', type: 'text', placeholder: 'Node type or empty for all types', title: 'Node type or empty for all types', value: opt.attributeMapping.nodeType }),
              $('<input/>', { class: 'node-input-otelAttributeMapping-key', type: 'text', placeholder: 'OTEL attribute key', title: 'OTEL attribute key', value: opt.attributeMapping.key }),
              $('<input/>', { class: 'node-input-otelAttributeMapping-path', type: 'text', placeholder: 'Msg path to data', title: 'Msg path to data', value: opt.attributeMapping.path }),
            ),
        )
        const timings = [
          { value: 'false', label: 'Start' },
          { value: 'true', label: 'End' },
        ]
        timings.forEach(timing => {
          selectField.append($('<option></option>').val(timing.value).text(timing.label))
        })
        selectField.val(`${opt.attributeMapping.isAfter}`)
      },
      sortable: false,
      removable: true,
    })
    // sort and display attributes
    this.attributeMappings
      .sort(sortAttributeMappings)
      .forEach((attributeMapping) => {
        $('#node-input-otelAttributeMapping-container').editableList('addItem', { attributeMapping })
      })
  },
  oneditsave: function () {
    const attributeMappings = []
    $('#node-input-otelAttributeMapping-container').editableList('items').each(function () {
      attributeMappings.push({
        isAfter: this.find('.node-input-otelAttributeMapping-isAfterProcess').val() === 'true',
        flow: this.find('.node-input-otelAttributeMapping-flow').val(),
        nodeType: this.find('.node-input-otelAttributeMapping-nodeType').val(),
        key: this.find('.node-input-otelAttributeMapping-key').val(),
        path: this.find('.node-input-otelAttributeMapping-path').val(),
      })
    })
    this.attributeMappings = attributeMappings.sort(sortAttributeMappings)
  },
})
</script>

<script type="text/html" data-template-name="OpenTelemetry">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name">
  </div>
  <hr/>
  <div class="form-row" title="OpenTelemetry traces exporter endpoint">
    <label for="node-input-url"><i class="fa fa-globe"></i> Traces URL</label>
    <input type="text" id="node-input-url" placeholder="http://localhost:4318/v1/traces">
  </div>
  <div class="form-row" title="OpenTelemetry metrics exporter endpoint">
    <label for="node-input-metricsUrl"><i class="fa fa-globe"></i> Metrics URL</label>
    <input type="text" id="node-input-metricsUrl" placeholder="http://localhost:4318/v1/metrics">
  </div>
  <div class="form-row" title="OpenTelemetry logs exporter endpoint">
    <label for="node-input-logsUrl"><i class="fa fa-globe"></i> Logs URL</label>
    <input type="text" id="node-input-logsUrl" placeholder="http://localhost:4318/v1/logs">
  </div>
  <div class="form-row" title="OpenTelemetry exporter protocol">
    <label for="node-input-protocol"><i class="fa fa-cog"></i> Protocol</label>
    <select id="node-input-protocol">
      <option value="http">http/json</option>
      <option value="proto">http/protobuf</option>
    </select>
  </div>
  <div class="form-row" title="OpenTelemetry service name">
    <label for="node-input-serviceName"><i class="fa fa-server"></i> Service</label>
    <input type="text" id="node-input-serviceName" placeholder="Node-RED">
  </div>
  <div class="form-row">
    <label style="width: auto;"><i class="fa fa-check-square-o"></i> Enable Signals:</label>
    <div style="display: inline-block; margin-left: 10px;">
      <input type="checkbox" id="node-input-tracesEnabled" style="display: inline-block; width: auto; vertical-align: top;">
      <label for="node-input-tracesEnabled" style="width: auto;">Traces</label>
      <input type="checkbox" id="node-input-metricsEnabled" style="display: inline-block; width: auto; vertical-align: top; margin-left: 10px;">
      <label for="node-input-metricsEnabled" style="width: auto;">Metrics</label>
      <input type="checkbox" id="node-input-logsEnabled" style="display: inline-block; width: auto; vertical-align: top; margin-left: 10px;">
      <label for="node-input-logsEnabled" style="width: auto;">Logs</label>
    </div>
  </div>
  <div class="form-row" title="Prefix added in the root Node-RED span name before initial node name">
    <label for="node-input-rootPrefix"><i class="fa fa-tag"></i> Root prefix</label>
    <input type="text" id="node-input-rootPrefix" placeholder="Message ">
  </div>  <div class="form-row" title="Do not trace nodes of these types">
    <label for="node-input-ignoredTypes"><i class="fa fa-ban"></i> Ignored</label>
    <input type="text" id="node-input-ignoredTypes" placeholder="debug,catch">
  </div>
  <div class="form-row" title="Forward trace headers on these types of nodes">
    <label for="node-input-propagateHeadersTypes"><i class="fa fa-suitcase"></i> Propagate</label>
    <input type="text" id="node-input-propagateHeadersTypes" placeholder="mycustomnode,othernode">
  </div>
  <div class="form-row" title="Time in seconds after which an unmodified message will be ended and deleted">
    <label for="node-input-timeout"><i class="fa fa-hourglass"></i> Timeout</label>
    <input type="number" id="node-input-timeout" placeholder="10">
  </div>
  <div class="form-row" title="Node-RED console log level">
    <label for="node-input-logLevel"><i class="fa fa-bug"></i> Log level</label>
    <select id="node-input-logLevel">
      <option value="off">off</option>
      <option value="error">error</option>
      <option value="warn">warn</option>
      <option value="info">info</option>
      <option value="debug">debug</option>
    </select>
  </div>
  <hr/>
  <div class="form-row" style="margin-bottom:0;">
    <label style="width: 100%;"><i class="fa fa-list"></i> <span> Span attribute mappings</span></label>
  </div>
  <div class="form-row node-input-otelAttributeMapping-container-row">
    <ol id="node-input-otelAttributeMapping-container"></ol>
  </div>
</script>

<script type="text/html" data-help-name="OpenTelemetry">
  <p>Instruments Node-RED flows with OpenTelemetry distributed tracing. This node sends traces to an OpenTelemetry collector (e.g., Jaeger, Zipkin, or OTLP-compatible backends).</p>
  <h3>Configuration</h3>
  <dl class="message-properties">
    <dt>Url <span class="property-type">string</span></dt>
    <dd>The OTLP HTTP endpoint for traces (e.g., <code>http://localhost:4318/v1/traces</code>).</dd>
    <dt>Protocol <span class="property-type">select</span></dt>
    <dd>The transport protocol: <code>http/json</code> or <code>http/protobuf</code>.</dd>
    <dt>Service <span class="property-type">string</span></dt>
    <dd>The service name that will identify these traces in your backend (default: <code>Node-RED</code>).</dd>
    <dt>Root prefix <span class="property-type">string</span></dt>
    <dd>An optional prefix for the root span of each message (e.g., <code>Order </code>).</dd>
    <dt>Ignored <span class="property-type">string</span></dt>
    <dd>A comma-separated list of node types to exclude from tracing (e.g., <code>debug,catch,inject</code>).</dd>
    <dt>Propagate <span class="property-type">string</span></dt>
    <dd>A comma-separated list of node types that should inject W3C Trace Context headers into outgoing requests (e.g., <code>http request</code>).</dd>
    <dt>Timeout <span class="property-type">number</span></dt>
    <dd>The maximum time (in seconds) to wait for a message to complete before closing its span if it gets "lost" in the flow.</dd>
  </dl>

  <h3>Span Attribute Mappings</h3>
  <p>You can extract data from the <code>msg</code> object and attach it as attributes to the generated spans.</p>
  <ul>
    <li><strong>Timing</strong>: <code>Start</code> (before node processing) or <code>End</code> (after node processing).</li>
    <li><strong>Flow ID</strong>: Optional. Only apply mapping if the message is in this flow.</li>
    <li><strong>Node Type</strong>: Optional. Only apply mapping for nodes of this type (e.g., <code>http request</code>).</li>
    <li><strong>OTEL Key</strong>: The name of the attribute in OpenTelemetry (e.g., <code>customer.id</code>).</li>
    <li><strong>Msg Path</strong>: The <a href="https://jmespath.org/" target="_blank">JMESPath</a> query to extract data from <code>msg</code> (e.g., <code>payload.userId</code>).</li>
  </ul>

  <p><strong>Note:</strong> This node only needs to be added <b>once</b> in your entire Node-RED instance to enable tracing for all flows.</p>

  <h3>References</h3>
  <ul>
    <li><a href="https://opentelemetry.io/docs/" target="_blank">OpenTelemetry Documentation</a></li>
    <li><a href="https://github.com/frankvdb7/node-red-contrib-opentelemetry" target="_blank">Project GitHub</a></li>
  </ul>
</script>
