<!--  Prometheus node -->
<script type="text/javascript">
RED.nodes.registerType('Prometheus Exporter', {
  category: 'Tracing',
  paletteLabel: 'Prometheus',
  icon: 'prometheus.svg',
  color: '#E66F51',
  defaults: {
    name: {
      value: 'Prometheus',
    },
    endpoint: {
      value: '/metrics',
      required: true,
      validate: function (v) {
        try {
          new URL(`http://localhost:1881${v}`)
          return true
        } catch (err) {
          return false
        }
      },
    },
    port: {
      value: 1881,
      required: true,
    },
    serviceName: {
      value: 'Node-RED',
      required: true,
    },
    instrumentName: {
      value: 'http_request_duration',
      required: true,
    },
  },
  label: function () {
    return this.name || 'Prometheus exporter'
  },
})
</script>

<script type="text/html" data-template-name="Prometheus Exporter">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Prometheus exporter">
  </div>
  <hr/>
  <div class="form-row">
    <label for="node-input-port"><i class="fa fa-globe"></i> Port</label>
    <input type="number" id="node-input-port" style="width: 70px;" placeholder="1881" title="Prometheus scraping port (1881)">
    <label for="node-input-endpoint" style="margin-left:20px; width:62px;">Endpoint</label>
    <input type="text" id="node-input-endpoint" style="width: calc(70% - 160px);" placeholder="/metrics" title="Prometheus scraping endpoint (/metrics)">
  </div>
  <div class="form-row" title="Prometheus service name (Node-RED)">
    <label for="node-input-serviceName"><i class="fa fa-tag"></i> Service</label>
    <input type="text" id="node-input-serviceName" placeholder="Node-RED">
  </div>
  <div class="form-row" title="Prometheus instrument name (http_request_duration)">
    <label for="node-input-instrumentName"><i class="fa fa-tag"></i> Instrument</label>
    <input type="text" id="node-input-instrumentName" placeholder="http_request_duration">
  </div>
</script>

<script type="text/html" data-help-name="Prometheus Exporter">
  <p>Collects metrics from <code>http in</code> nodes and exposes them for Prometheus scraping.</p>
  <h3>Configuration</h3>
  <dl class="message-properties">
    <dt>Port <span class="property-type">number</span></dt>
    <dd>The port on which the metrics server will run (default: <code>1881</code>).</dd>
    <dt>Endpoint <span class="property-type">string</span></dt>
    <dd>The path where metrics are exposed (default: <code>/metrics</code>).</dd>
    <dt>Service <span class="property-type">string</span></dt>
    <dd>The service name included in the <code>target_info</code> metric.</dd>
    <dt>Instrument <span class="property-type">string</span></dt>
    <dd>The name of the histogram metric for request duration (default: <code>http_request_duration</code>).</dd>
  </dl>

  <h3>Installation Requirement</h3>
  <p>To capture metrics, you <b>must</b> add the provided middleware to your Node-RED <code>settings.js</code> file:</p>
  <pre style="font-size: 0.8em;">
// 1. At the top of settings.js:
const { prometheusMiddleware } = require('@frankvdb/node-red-contrib-opentelemetry/lib/prometheus-exporter.js');

// 2. In the module.exports object:
module.exports = {
    // ...
    httpNodeMiddleware: prometheusMiddleware,
    // ...
}</pre>

  <p><strong>Note:</strong> This node only needs to be added <b>once</b> in your entire Node-RED instance.</p>

  <h3>References</h3>
  <ul>
    <li><a href="https://prometheus.io/docs/introduction/overview/" target="_blank">Prometheus Documentation</a></li>
    <li><a href="https://github.com/frankvdb7/node-red-contrib-opentelemetry" target="_blank">Project GitHub</a></li>
  </ul>
</script>
